

services:
  backend:
    image: fusion-backend:latest
    container_name: shundao-backend
    restart: unless-stopped
    ports:
      - "5039:5039"
    volumes:
      - ./configs:/app/configs:ro
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Ho_Chi_Minh
    networks:
      - shundao-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5039/api/dashboard"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: fusion-frontend:latest
    container_name: shundao-frontend
    restart: unless-stopped
    ports:
      - "9005:80"
    depends_on:
      - backend
    networks:
      - shundao-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  ngrok:
    image: ngrok/ngrok:latest
    container_name: shundao-ngrok
    restart: unless-stopped
    command: http frontend:80
    environment:
      - NGROK_AUTHTOKEN=39Tug0aqKauZ23q54ItVyHAUrtF_9gXjBuku9sapvfsVe7NM
    ports:
      - 4040:4040
    depends_on:
      - backend
    networks:
      - shundao-network

networks:
  shundao-network:
    driver: bridge
